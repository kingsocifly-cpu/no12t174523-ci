name: APKs (todas as variantes)

# Roda no repo PUBLICO (minutos gratis/ilimitados). Clona o codigo do repo PRIVADO
# via secret SRC_TOKEN e builda os 22 APKs, juntando tudo num zip unico.

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        variant:
          - { name: "Cakto",         app_id: "com.notifymancer.app1",  icon: "icone1"  }
          - { name: "Braip",         app_id: "com.notifymancer.app2",  icon: "icone2"  }
          - { name: "Appmax",        app_id: "com.notifymancer.app3",  icon: "icone3"  }
          - { name: "SellerCenter",  app_id: "com.notifymancer.app4",  icon: "icone4"  }
          - { name: "Eduzz",         app_id: "com.notifymancer.app5",  icon: "icone5"  }
          - { name: "Hotmart",       app_id: "com.notifymancer.app6",  icon: "icone6"  }
          - { name: "Kirvano",       app_id: "com.notifymancer.app7",  icon: "icone7"  }
          - { name: "Kiwify Cursos", app_id: "com.notifymancer.app8",  icon: "icone8"  }
          - { name: "Pepper",        app_id: "com.notifymancer.app9",  icon: "icone9"  }
          - { name: "Perfect Pay",   app_id: "com.notifymancer.app10", icon: "icone10" }
          - { name: "Shopify",       app_id: "com.notifymancer.app11", icon: "icone11" }
          - { name: "SuitPay",       app_id: "com.notifymancer.app12", icon: "icone12" }
          - { name: "Utmify",        app_id: "com.notifymancer.app13", icon: "icone13" }
          - { name: "AmazonSeller",  app_id: "com.notifymancer.app14", icon: "icone14" }
          - { name: "Amazon",        app_id: "com.notifymancer.app15", icon: "icone15" }
          - { name: "Santander",     app_id: "com.notifymancer.app16", icon: "icone16" }
          - { name: "Itaú",          app_id: "com.notifymancer.app17", icon: "icone17" }
          - { name: "Inter",         app_id: "com.notifymancer.app18", icon: "icone18" }
          - { name: "Nubank",        app_id: "com.notifymancer.app19", icon: "icone19" }
          - { name: "Mercado Pago",  app_id: "com.notifymancer.app20", icon: "icone20" }
          - { name: "C6 Bank",       app_id: "com.notifymancer.app21", icon: "icone21" }
          - { name: "InfinitePay",   app_id: "com.notifymancer.app22", icon: "icone22" }

    steps:
      - name: Checkout codigo PRIVADO
        uses: actions/checkout@v4
        with:
          repository: kingsocifly-cpu/Notify
          token: ${{ secrets.NOTIFY_CI }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar dependencias
        run: npm install

      - name: Patch notificacao (nome do app na notificacao)
        run: node scripts/patch-plugin-android.mjs

      - name: Configurar variante (nome / package id)
        run: |
          node -e "const fs=require('fs');const p='capacitor.config.json';const c=JSON.parse(fs.readFileSync(p,'utf8'));c.appName=process.env.APP_NAME;c.appId=process.env.APP_ID;fs.writeFileSync(p,JSON.stringify(c,null,2));console.log('Variante:',c.appName,'|',c.appId);"
        env:
          APP_NAME: ${{ matrix.variant.name }}
          APP_ID: ${{ matrix.variant.app_id }}

      - name: Adicionar plataforma Android
        run: npx cap add android

      - name: Sincronizar web -> Android
        run: npx cap sync android

      - name: Gerar icones + troca de icone (aliases)
        run: npm run icons:android
        env:
          MAIN_ICON: ${{ matrix.variant.icon }}
          NOTIF_ICON: ${{ matrix.variant.icon }}

      - name: Gerar sons (res/raw)
        run: npm run sounds:android

      - name: Build do APK (debug)
        working-directory: android
        run: |
          chmod +x ./gradlew
          set -o pipefail
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Renomear APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk "${{ matrix.variant.name }}.apk"

      - name: Publicar artefato (.apk)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant.name }}-apk
          path: ${{ matrix.variant.name }}.apk
          retention-days: 14

  juntar:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Juntar todos os APKs num zip unico
        uses: actions/upload-artifact/merge@v4
        with:
          name: NotifyMancer-TODOS-APKs
          pattern: "*-apk"
          delete-merged: true
          retention-days: 14
