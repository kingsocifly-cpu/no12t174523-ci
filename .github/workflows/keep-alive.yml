name: Keep-alive Supabase

# Mantem o projeto Supabase (plano Free) ATIVO, evitando a pausa por inatividade
# (~7 dias). Faz um ping leve numa RPC publica a cada 3 dias. Roda no repo PUBLICO
# (minutos gratis). A anon key e publica por design (ja vai no app).

on:
  schedule:
    - cron: "0 6 */3 * *"   # a cada 3 dias, 06:00 UTC
  workflow_dispatch:          # permite rodar na mao pra testar

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase (app_status)
        run: |
          URL="https://zcrbqwvxkcqrpksnxubm.supabase.co"
          ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpjcmJxd3Z4a2NxcnBrc254dWJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTE2OTksImV4cCI6MjA5NzM2NzY5OX0.m9Tmm2zD_k3DL0KohkXYApPEjtGft4Mw_m5cbFRwxBY"
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$URL/rest/v1/rpc/app_status" \
            -H "Content-Type: application/json" \
            -H "apikey: $ANON" \
            -H "Authorization: Bearer $ANON" \
            -d '{"p_version":2}')
          echo "app_status -> HTTP $code"
          if [ "$code" != "200" ]; then echo "::warning::ping nao retornou 200"; fi
